<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seal Generator</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/css/winbox.min.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/",
          "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/build/index.module.js",
          "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.17/build/index.module.js"
        }
      }
    </script>
  </head>
  <body data-theme="dark">
    <aside class="panel">
      <div class="topbar">
        <label class="mini">
          <span id="themeLabel">Theme</span>
          <select id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label class="mini">
          <span id="langLabel">Language</span>
          <select id="langSelect">
            <option value="en">EN</option>
            <option value="ru">RU</option>
          </select>
        </label>
        <label class="mini">
          <span id="sidebarSideLabel">Sidebar</span>
          <select id="sidebarSideSelect">
            <option value="left">Left</option>
            <option value="right">Right</option>
          </select>
        </label>
      </div>

      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1 id="title">Seal Generator</h1>
          <p class="hint" id="subtitle">SVG -> STL with live 3D preview</p>
        </div>
      </div>

      <details class="accordion view-panel" open>
        <summary id="viewSectionLabel">View & Export</summary>
        <div class="tool-box">
          <h3 id="box1Label">1. Gizmo & View</h3>
          <label class="field checkbox">
            <input id="wireframeMode" type="checkbox" />
            <span id="wireframeModeLabel">Wireframe preview</span>
          </label>
          <label class="field checkbox">
            <input id="gizmoEnabled" type="checkbox" checked />
            <span id="gizmoEnabledLabel">Enable gizmo</span>
          </label>
          <label class="field">
            <span id="gizmoTargetLabel">Gizmo target</span>
            <select id="gizmoTarget">
              <option value="emblem">Emblem</option>
              <option value="base">Base</option>
            </select>
          </label>
          <button id="gizmoModeBtn">Gizmo: Translate</button>
        </div>

        <div class="tool-box">
          <h3 id="box2Label">2. Selected Object</h3>
          <p class="hint" id="selectedObjectLabel">Selected: Emblem</p>
          <div id="emblemOffsetGroup">
            <label class="field">
              <span id="emblemOffsetXLabel">Emblem offset X (mm)</span>
              <div class="range-row">
                <input id="emblemOffsetX" type="range" min="-100" max="100" step="0.1" value="0" />
                <input id="emblemOffsetXValue" type="number" min="-100" max="100" step="0.1" value="0" />
              </div>
            </label>
            <label class="field">
              <span id="emblemOffsetYLabel">Emblem offset Y (mm)</span>
              <div class="range-row">
                <input id="emblemOffsetY" type="range" min="-100" max="100" step="0.1" value="0" />
                <input id="emblemOffsetYValue" type="number" min="-100" max="100" step="0.1" value="0" />
              </div>
            </label>
            <label class="field">
              <span id="emblemOffsetZLabel">Emblem offset Z (mm)</span>
              <div class="range-row">
                <input id="emblemOffsetZ" type="range" min="-100" max="100" step="0.1" value="0" />
                <input id="emblemOffsetZValue" type="number" min="-100" max="100" step="0.1" value="0" />
              </div>
            </label>
          </div>
          <div id="baseOffsetGroup" style="display:none">
            <label class="field">
              <span id="baseOffsetXLabel">Base offset X (mm)</span>
              <div class="range-row">
                <input id="baseOffsetX" type="range" min="-100" max="100" step="0.1" value="0" />
                <input id="baseOffsetXValue" type="number" min="-100" max="100" step="0.1" value="0" />
              </div>
            </label>
            <label class="field">
              <span id="baseOffsetYLabel">Base offset Y (mm)</span>
              <div class="range-row">
                <input id="baseOffsetY" type="range" min="-100" max="100" step="0.1" value="0" />
                <input id="baseOffsetYValue" type="number" min="-100" max="100" step="0.1" value="0" />
              </div>
            </label>
            <label class="field">
              <span id="baseOffsetZLabel">Base offset Z (mm)</span>
              <div class="range-row">
                <input id="baseOffsetZ" type="range" min="-100" max="100" step="0.1" value="0" />
                <input id="baseOffsetZValue" type="number" min="-100" max="100" step="0.1" value="0" />
              </div>
            </label>
          </div>
        </div>

        <button id="flatViewBtn">Flat View</button>
        <button id="exportBtn" disabled>Export STL</button>
        <button id="exportCombinedBtn" disabled>Export STL (with base)</button>
        <button id="exportZipBtn" disabled>Export ZIP (batch)</button>
        <div class="row-buttons">
          <button id="undoBtn">Undo</button>
          <button id="redoBtn">Redo</button>
        </div>
        <div class="row-buttons">
          <button id="resetSettingsBtn">Reset Settings</button>
          <button id="clearCacheBtn">Clear Cache</button>
        </div>
      </details>

      <pre id="status">Load an SVG to start.</pre>
      <p class="license-note" id="licenseNote">
        All code and visual assets in this repo are released under CC0 1.0 (public domain).
      </p>
    </aside>

    <main id="viewport"></main>

    <div id="floatingPanelsSource">
      <section id="modelWindowContent" class="floating-content">
        <h3 id="modelSectionLabel">Model</h3>
          <label class="field">
            <span id="libraryCategoryLabel">Library category</span>
            <select id="libraryCategory"></select>
          </label>
          <label class="field">
            <span id="librarySingleLabel">Library SVG (single)</span>
            <select id="librarySingle"></select>
          </label>
          <button id="libraryPreviewBtn">Open library browser</button>
          <button id="libraryLoadSingleBtn">Load from library</button>
          <label class="field">
            <span id="svgFileLabel">SVG file</span>
            <input id="svgFile" type="file" accept=".svg,image/svg+xml" multiple />
          </label>

          <label class="field">
            <span id="sizeLabel">Size (max dimension, mm)</span>
            <div class="range-row">
              <input id="size" type="range" min="10" max="200" step="1" value="60" />
              <input id="sizeValue" type="number" min="10" max="200" step="1" value="60" />
            </div>
          </label>

          <label class="field">
            <span id="thicknessLabel">Thickness (mm)</span>
            <div class="range-row">
              <input id="thickness" type="range" min="0.5" max="20" step="0.1" value="2" />
              <input id="thicknessValue" type="number" min="0.5" max="20" step="0.1" value="2.0" />
            </div>
          </label>

          <label class="field">
            <span id="scaleXLabel">Scale X</span>
            <div class="range-row">
              <input id="scaleX" type="range" min="0.1" max="3" step="0.01" value="1" />
              <input id="scaleXValue" type="number" min="0.1" max="3" step="0.01" value="1.00" />
            </div>
          </label>

          <label class="field">
            <span id="scaleYLabel">Scale Y</span>
            <div class="range-row">
              <input id="scaleY" type="range" min="0.1" max="3" step="0.01" value="1" />
              <input id="scaleYValue" type="number" min="0.1" max="3" step="0.01" value="1.00" />
            </div>
          </label>

          <label class="field">
            <span id="scaleZLabel">Scale Z</span>
            <div class="range-row">
              <input id="scaleZ" type="range" min="0.1" max="3" step="0.01" value="1" />
              <input id="scaleZValue" type="number" min="0.1" max="3" step="0.01" value="1.00" />
            </div>
          </label>

          <label class="field">
            <span id="densityLabel">Line density</span>
            <input id="density" type="range" min="4" max="64" step="1" value="16" />
            <output id="densityOut">16</output>
          </label>

          <label class="field checkbox">
            <input id="autoFix" type="checkbox" checked />
            <span id="autoFixLabel">Auto-fix unclosed faces</span>
          </label>

          <label class="field checkbox">
            <input id="flipY" type="checkbox" checked />
            <span id="flipYLabel">Flip vertically (top-bottom)</span>
          </label>

          <label class="field checkbox">
            <input id="flipX" type="checkbox" checked />
            <span id="flipXLabel">Flip horizontally (left-right)</span>
          </label>

          <label class="field checkbox">
            <input id="inverseMode" type="checkbox" />
            <span id="inverseModeLabel">Inverse (negative stamp)</span>
          </label>
      </section>

      <section id="baseWindowContent" class="floating-content">
          <h3 id="baseSectionLabel">Base</h3>
          <label class="field">
            <span id="baseStlLabel">Base STL (optional)</span>
            <input id="baseStlFile" type="file" accept=".stl,model/stl" />
          </label>

          <label class="field checkbox">
            <input id="generateBase" type="checkbox" />
            <span id="generateBaseLabel">Generate round base</span>
          </label>

          <label class="field">
            <span id="baseDiameterLabel">Base diameter (mm)</span>
            <div class="range-row">
              <input id="baseDiameter" type="range" min="10" max="200" step="1" value="40" />
              <input id="baseDiameterValue" type="number" min="10" max="200" step="1" value="40" />
            </div>
          </label>

          <label class="field">
            <span id="baseThicknessLabel">Base thickness (mm)</span>
            <div class="range-row">
              <input id="baseThickness" type="range" min="0.5" max="20" step="0.1" value="2" />
              <input id="baseThicknessValue" type="number" min="0.5" max="20" step="0.1" value="2.0" />
            </div>
          </label>

          <label class="field">
            <span id="liftLabel">Lift over base (mm)</span>
            <div class="range-row">
              <input id="lift" type="range" min="0" max="5" step="0.1" value="0.2" />
              <input id="liftValue" type="number" min="0" max="5" step="0.1" value="0.2" />
            </div>
          </label>

          <label class="field">
            <span id="insetLabel">Inset depth (inverse, mm)</span>
            <div class="range-row">
              <input id="inset" type="range" min="0" max="10" step="0.1" value="1.0" />
              <input id="insetValue" type="number" min="0" max="10" step="0.1" value="1.0" />
            </div>
          </label>

          <button id="fitBaseToEmblemBtn">Auto-fit base to emblem</button>
          <button id="fitEmblemToBaseBtn">Auto-fit emblem to base</button>
      </section>

      <section id="batchWindowContent" class="floating-content">
          <h3 id="batchSectionLabel">Batch</h3>
          <label class="field">
            <span id="batchFitRatioLabel">Batch fit ratio</span>
            <input id="batchFitRatio" type="number" min="0.5" max="1.2" step="0.01" value="0.90" />
          </label>
          <label class="field">
            <span id="batchLiftLabel">Batch lift over base (mm)</span>
            <input id="batchLift" type="number" min="0" max="5" step="0.1" value="0.2" />
          </label>
          <label class="field">
            <span id="batchInsetLabel">Batch inset depth (inverse, mm)</span>
            <input id="batchInset" type="number" min="0" max="10" step="0.1" value="1.0" />
          </label>
          <label class="field">
            <span id="batchLibraryLabel">Library SVG (multiple)</span>
            <select id="batchLibraryList" multiple size="8"></select>
          </label>
          <button id="batchPreviewBtn">Open library browser</button>
          <button id="batchAddLibraryBtn">Add selected from library</button>
          <label class="field">
            <span id="batchSvgLabel">Batch SVG files</span>
            <input id="batchSvgFiles" type="file" accept=".svg,image/svg+xml" multiple />
          </label>
          <label class="field checkbox">
            <input id="batchInverseMode" type="checkbox" />
            <span id="batchInverseLabel">Batch inverse mode</span>
          </label>
          <button id="batchExportBtn" disabled>Export Batch ZIP (fit to base)</button>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/winbox.bundle.min.js"></script>

    <div id="libraryPreviewModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <strong id="libraryPreviewTitle">Library Browser</strong>
          <button id="libraryPreviewCloseBtn" class="modal-close" type="button">×</button>
        </div>
        <label class="field">
          <span id="libraryHoverDelayLabel">Hover preview delay (ms)</span>
          <input id="libraryHoverDelay" type="number" min="100" max="3000" step="100" value="1000" />
        </label>
        <div class="library-browser">
          <aside class="library-sidebar">
            <p class="hint" id="libraryPreviewMeta">Category</p>
            <div id="libraryCategoryList" class="library-category-list"></div>
          </aside>
          <section class="library-grid-wrap">
            <div id="librarySvgGrid" class="library-grid"></div>
          </section>
        </div>
        <div id="libraryHoverPreview" class="library-hover-preview hidden">
          <img id="libraryHoverPreviewImg" alt="Full SVG preview" />
          <p id="libraryHoverPreviewName"></p>
        </div>
        <div class="row-buttons">
          <button id="libraryPreviewPrimaryBtn" type="button">Load selected</button>
          <button id="libraryPreviewCancelBtn" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
