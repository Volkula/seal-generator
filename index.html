<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seal Generator</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body data-theme="dark">
    <aside class="panel">
      <div class="topbar">
        <label class="mini">
          <span id="themeLabel">Theme</span>
          <select id="themeSelect">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>
        <label class="mini">
          <span id="langLabel">Language</span>
          <select id="langSelect">
            <option value="en">EN</option>
            <option value="ru">RU</option>
          </select>
        </label>
      </div>

      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1 id="title">Seal Generator</h1>
          <p class="hint" id="subtitle">SVG -> STL with live 3D preview</p>
        </div>
      </div>

      <label class="field">
        <span id="svgFileLabel">SVG file</span>
        <input id="svgFile" type="file" accept=".svg,image/svg+xml" />
      </label>

      <label class="field">
        <span id="sizeLabel">Size (max dimension, mm)</span>
        <div class="range-row">
          <input id="size" type="range" min="10" max="200" step="1" value="60" />
          <input id="sizeValue" type="number" min="10" max="200" step="1" value="60" />
        </div>
      </label>

      <label class="field">
        <span id="thicknessLabel">Thickness (mm)</span>
        <div class="range-row">
          <input id="thickness" type="range" min="0.5" max="20" step="0.1" value="2" />
          <input id="thicknessValue" type="number" min="0.5" max="20" step="0.1" value="2.0" />
        </div>
      </label>

      <label class="field">
        <span id="densityLabel">Line density</span>
        <input id="density" type="range" min="4" max="64" step="1" value="16" />
        <output id="densityOut">16</output>
      </label>

      <label class="field checkbox">
        <input id="autoFix" type="checkbox" checked />
        <span id="autoFixLabel">Auto-fix unclosed faces</span>
      </label>

      <label class="field checkbox">
        <input id="flipY" type="checkbox" checked />
        <span id="flipYLabel">Flip vertically (top-bottom)</span>
      </label>

      <label class="field checkbox">
        <input id="flipX" type="checkbox" />
        <span id="flipXLabel">Flip horizontally (left-right)</span>
      </label>

      <button id="exportBtn" disabled>Export STL</button>
      <pre id="status">Load an SVG to start.</pre>
      <p class="license-note" id="licenseNote">
        All code and visual assets in this repo are released under CC0 1.0 (public domain).
      </p>
    </aside>

    <main id="viewport"></main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
